<!DOCTYPE HTML>
<html>
<head>
  <title>SEM Characterization | Azmal Chowdhury</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- CSS -->
  <link rel="stylesheet" href="../../assets/css/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>

    /* SECTION GROUPING */
    .sem-section {
      margin: 2.5rem 0;
    }

    .sem-section h2 {
      border-bottom: 3px solid #18bfef;
      padding-bottom: 0.5rem;
      display: inline-block;
    }

    /* GALLERY */
    .project-gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .project-gallery figure {
      flex: 1 1 calc(33.333% - 1rem);
      margin: 0;
      text-align: center;
    }

    .project-gallery img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #eee;
    }

    .project-gallery figcaption {
      font-size: 0.8rem;
      margin-top: 0.5rem;
      color: #666;
    }

    /* IMAGE WRAPPER + ANNOTATION */
    .image-wrapper {
      position: relative;
      cursor: zoom-in;
    }

    .annotation {
      position: absolute;
      color: yellow;
      font-size: 0.75rem;
      font-weight: bold;
      background: rgba(0,0,0,0.6);
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* MODAL ZOOM */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      padding-top: 40px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.95);
    }

    .modal img {
      margin: auto;
      display: block;
      max-width: 90%;
      max-height: 90%;
    }

    .modal:target {
      display: block;
    }

    @media screen and (max-width: 736px) {
      .project-gallery figure {
        flex: 1 1 100%;
      }
    }

  </style>
</head>

<body>

<div id="wrapper">

  <!-- Header -->
  <header id="header">
    <a href="../../index.html" class="logo">Azmal Chowdhury</a>
  </header>

  <!-- Main -->
  <div id="main">
    <article class="post">

      <header class="major">
        <h1>SEM Characterization</h1>
        <p>Micro/Nano Structural Analysis for Functional Materials</p>
      </header>

      <!-- ========================= -->
      <!-- Carbon Cloth -->
      <!-- ========================= -->
      <section class="sem-section">
        <h2>Carbon Cloth</h2>

        <div class="project-gallery">
          <figure>
            <a href="#img1">
              <div class="image-wrapper">
                <img src="images/carbon cloth 100um.png">

                <div class="annotation" style="top:25%; left:20%;">Fiber Bundle</div>
                <div class="annotation" style="top:60%; left:50%;">Weave Junction</div>
              </div>
            </a>
            <figcaption>Woven carbon fiber bundles (~100 µm scale)</figcaption>
          </figure>
        </div>
      </section>

      <!-- ========================= -->
      <!-- Graphene -->
      <!-- ========================= -->
      <section class="sem-section">
        <h2>Graphene Nanoplatelets on PDMS</h2>

        <div class="project-gallery">

          <figure>
            <a href="#img2">
              <div class="image-wrapper">
                <img src="images/Cu_GNP CS on PDMS_9.png">
                <div class="annotation" style="top:40%; left:30%;">Layered Flakes</div>
              </div>
            </a>
            <figcaption>Graphene flake stacking</figcaption>
          </figure>

          <figure>
            <a href="#img3">
              <div class="image-wrapper">
                <img src="images/Cu_GNP CS on PDMS_16.png">
                <div class="annotation" style="top:50%; left:40%;">Dense Network</div>
              </div>
            </a>
            <figcaption>Dense conductive network</figcaption>
          </figure>

          <figure>
            <a href="#img4">
              <div class="image-wrapper">
                <img src="images/Cu_GNP CS on PDMS_17.png">
                <div class="annotation" style="top:55%; left:30%;">Coating Thickness</div>
              </div>
            </a>
            <figcaption>Cross-sectional morphology</figcaption>
          </figure>

        </div>
      </section>

      <!-- ========================= -->
      <!-- Porous PDMS -->
      <!-- ========================= -->
      <section class="sem-section">
        <h2>Porous PDMS</h2>

        <div class="project-gallery">

          <figure>
            <a href="#img5">
              <div class="image-wrapper">
                <img src="images/Porous PDMS.png">
                <div class="annotation" style="top:40%; left:40%;">Macropores</div>
              </div>
            </a>
            <figcaption>Large pore structure</figcaption>
          </figure>

          <figure>
            <a href="#img6">
              <div class="image-wrapper">
                <img src="images/Porous PDMS_2.png">
                <div class="annotation" style="top:50%; left:30%;">Interconnected Network</div>
              </div>
            </a>
            <figcaption>Porous connectivity</figcaption>
          </figure>

        </div>
      </section>

      <!-- ========================= -->
      <!-- Tissue -->
      <!-- ========================= -->
      <section class="sem-section">
        <h2>Tissue Paper</h2>

        <div class="project-gallery">
          <figure>
            <a href="#img7">
              <div class="image-wrapper">
                <img src="images/TISSUE_PAPER.png">
                <div class="annotation" style="top:40%; left:40%;">Cellulose Fiber</div>
              </div>
            </a>
            <figcaption>Fibrous cellulose network</figcaption>
          </figure>
        </div>
      </section>

      <!-- Back -->
      <div style="text-align:center; margin-top:3rem;">
        <a href="../../projects.html" class="button primary">← Back</a>
      </div>

    </article>
  </div>

</div>

<!-- ========================= -->
<!-- MODALS (ZOOM) -->
<!-- ========================= -->

<div id="img1" class="modal"><a href="#"><img src="images/carbon cloth 100um.png"></a></div>
<div id="img2" class="modal"><a href="#"><img src="images/Cu_GNP CS on PDMS_9.png"></a></div>
<div id="img3" class="modal"><a href="#"><img src="images/Cu_GNP CS on PDMS_16.png"></a></div>
<div id="img4" class="modal"><a href="#"><img src="images/Cu_GNP CS on PDMS_17.png"></a></div>
<div id="img5" class="modal"><a href="#"><img src="images/Porous PDMS.png"></a></div>
<div id="img6" class="modal"><a href="#"><img src="images/Porous PDMS_2.png"></a></div>
<div id="img7" class="modal"><a href="#"><img src="images/TISSUE_PAPER.png"></a></div>

</body>
</html>
